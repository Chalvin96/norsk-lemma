name: Release Archive

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release-archive:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build release archive
        run: |
          archive_name="norsk-lemma-${GITHUB_REF_NAME}.tar.gz"
          # Ship the pre-translated lemma JSON (lemma/) — this is the importable
          # format consumed by the Flyt backend (seed.py). The README carries
          # CC BY 4.0 attribution.
          tar -czf "$archive_name" README.md lemma
          echo "ARCHIVE_NAME=$archive_name" >> "$GITHUB_ENV"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ARCHIVE_NAME }}
